services:
  db:
    image: postgres:16-alpine
    container_name: liveai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: liveai
      POSTGRES_PASSWORD: liveai
      POSTGRES_DB: liveai
    ports:
      # Host 5433 -> container 5432, to avoid clashing with a local Postgres.
      - "5433:5432"
    volumes:
      - liveai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liveai -d liveai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  liveai_pgdata:
