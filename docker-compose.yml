services:
  db:
    image: postgres:16-alpine
    container_name: interviewlab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: interviewlab
      POSTGRES_PASSWORD: interviewlab
      POSTGRES_DB: interviewlab
    ports:
      - "5433:5432"
    volumes:
      - interviewlab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewlab -d interviewlab"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  interviewlab_pgdata:
